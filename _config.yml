title: Analytiq Hub
author:
  name: Andrei Radulescu-Banu
  email: "andrei@analytiqhub.com"
description: > # this means to ignore newlines until "show_excerpts:"
  Analytiq Hub provides custom AI solutions and expert guidance
  for biotech and healthtech companies.

google_analytics: "G-S50PF58G08"

show_excerpts: false # set to true to show excerpts on the homepage
permalink: pretty
baseurl: ""
url: "https://analytiqhub.com"

# Logo (displayed in header next to site title)
logo: /assets/images/analytiq_hub_logo_40.png
logo_2x: /assets/images/analytiq_hub_logo_80.png

# Calendly integration
calendly_url: "https://calendly.com/analytiqhub"

# Minima date format
# refer to https://shopify.github.io/liquid/filters/date/ if you want to customize this
minima:
  date_format: "%b %-d, %Y"

  #skin: classic
  skin: dark
  #skin: solarized-dark
  #skin: solarized

  # generate social links in footer
  social_links:
    twitter: bitdribble
    github:  andrei-radulescu-banu
    # devto: jekyll
    # dribbble: jekyll
    # facebook: jekyll
    # flickr:   jekyll
    # instagram: jekyll
    linkedin: andrei-radulescu-banu
    # pinterest: jekyll
    # youtube: jekyll
    # youtube_channel: UC8CXR0-3I70i1tfPg1PAE1g
    # youtube_channel_name: CloudCannon
    # telegram: jekyll
    # googleplus: +jekyll
    # microdotblog: jekyll
    # keybase: jekyll

    # Mastodon instances
    # mastodon:
    # - username: jekyll
    #   instance: example.com
    # - username: jekyll2
    #   instance: example.com

    # GitLab instances
    # gitlab:
    # - username: jekyll
    #   instance: example.com
    # - username: jekyll2
    #   instance: example.com

# If you want to link only specific pages in your header, uncomment
# this and add the path to the pages in order as they should show up
header_pages:
  - title: "Resources"
    url: "#"
    children:
      - title: "Success Stories"
        url: "/case-studies"
      - title: "Technology"
        url: "/technology"
  - title: "Talks"
    url: "/talks"
  - title: "Blog"
    url: "/blog"
  - title: "About"
    url: "/about"
  - title: "Get Started"
    url: "/contact"
    button_style: "solid"

# Footer sitemap - simplified navigation for footer display
site_map:
  - title: "Services"
    links:
      - title: "Success Stories"
        url: "/case-studies"
      - title: "Technology"
        url: "/technology"
  - title: "Company"
    links:
      - title: "About"
        url: "/about"
      - title: "Privacy Policy"
        url: "/privacy"
  - title: "Resources"
    links:
      - title: "Blog"
        url: "/blog"
      - title: "Talks"
        url: "/talks"

# Build settings
theme: analytiq-pages-theme

# Collections
collections:
  posts:
    output: true
    permalink: /:categories/:title/

# Pagination configuration for jekyll-paginate-v2
pagination:
  enabled: true
  per_page: 5
  permalink: '/page/:num/'
  title: ':title - Page :num'
  limit: 0
  trail:
    before: 2
    after: 2
  sort_field: 'date'
  sort_reverse: true

plugins:
 - jekyll-feed
 - jekyll-seo-tag
 - jekyll-sitemap
 - jekyll-pdf-embed # Per example at https://github.com/MihajloNesic/minimal-mistakes-pdf-example/
 - jekyll-paginate-v2

future: true

# Default OG/social image for pages that don't set their own image front matter
defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/analytiq_hub_front_page.png

# Twitter card type - summary_large_image gives a large banner preview
twitter:
  username: bitdribble
  card: summary_large_image

# Google Search Console verification
# Get this from https://search.google.com/search-console → Settings → Ownership verification → HTML tag
# Paste only the content="...?" value
# google_site_verification: ""

# GitHub repository configuration
repository:  analytiq-hub/analytiq-hub.github.io